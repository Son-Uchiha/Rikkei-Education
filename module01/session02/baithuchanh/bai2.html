<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng danh sách nhân sự</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="m-8 text-black font-sans">
    <div class="max-w-[600px] mx-auto text-center">
      <h3 class="text-[18px] font-normal mb-2 text-gray-800">
        Danh sách nhân viên
      </h3>

      <table class="w-full border-collapse text-left text-sm">
        <thead>
          <tr class="border-b border-gray-200">
            <th class="py-2 font-bold text-center w-[10%]">STT</th>
            <th class="py-2 font-bold text-left w-[20%]">Mã NV</th>
            <th class="py-2 font-bold text-left w-[40%]">Họ tên</th>
            <th class="py-2 font-bold text-left w-[30%]">Phòng ban</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td class="py-2 text-center">1</td>
            <td class="py-2">NV001</td>
            <td class="py-2">Nguyễn Văn A</td>
            <td class="py-2">Hành chính</td>
          </tr>

          <tr>
            <td class="py-2 text-center">2</td>
            <td class="py-2">NV002</td>
            <td class="py-2">Trần Thị B</td>
            <td class="py-2">Kế toán</td>
          </tr>

          <tr>
            <td class="py-2 text-center">3</td>
            <td class="py-2">NV003</td>
            <td class="py-2">Lê Văn C</td>
            <td class="py-2">Kỹ thuật</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
