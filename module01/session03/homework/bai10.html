<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- 1. Nhúng CDN Tailwind v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --font-test:
          "Inter", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto",
          "sans-serif";
        --color-brand: #52b788;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      .author-underline::after {
        content: "";
        position: absolute;
        bottom: -18px;
        left: 50%;
        transform: translateX(-50%);
        width: 50%;
        height: 4px;
        background-color: #52b788;
        border-radius: 2px;
      }
    </style>
  </head>
  <body class="font-test text-white">
    <section
      class="relative w-full min-h-screen bg-[linear-gradient(rgba(36,48,59,0.85),rgba(36,48,59,0.85)),url('https://images.unsplash.com/photo-1607499699372-7bb722dff7e2?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D')] bg-cover bg-center bg-no-repeat flex justify-center items-center"
    >
      <div class="text-center">
        <h1
          class="relative text-5xl md:text-6xl font-bold tracking-tight mb-8 author-underline"
        >
          Nguyễn Duy Sơn
        </h1>
        <p class="text-[28px] text-[#a4b3c6] font-light mb-4">
          Frontend Developer
        </p>
        <p class="text-[16px] text-[#7e8b9b] mb-6">
          Thiết kế trải nghiệm người dùng, sáng tạo giao diện độc đáo, tối ưu
          hoá tương tác.
        </p>
        <p
          class="text-sm font-semibold text-brand tracking-[0.4em] mb-10 uppercase"
        >
          SÁNG TẠO ĐỂ DẪN ĐẦU
        </p>
        <a
          href="#"
          class="inline-block px-9 py-3 text-[15px] font-normal text-brand border border-brand rounded transition-all duration-300 ease-in-out bg-transparent hover:bg-brand hover:text-[#1a1a1a] hover:font-semibold hover:shadow-[0_4px_15px_rgba(82,183,136,0.4)] hover:-translate-y-0.5 active:translate-y-0"
        >
          Tải CV
        </a>
      </div>
    </section>
  </body>
</html>
