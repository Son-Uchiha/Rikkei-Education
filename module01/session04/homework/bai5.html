<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký nhận khuyến mãi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-lg shadow-lg max-w-lg w-full p-8 text-center">
        <h1 class="text-red-500 text-2xl font-bold mb-3">Đăng ký nhận khuyến mãi!</h1>
        <p class="text-gray-600 text-sm mb-6">
            Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ"
            <br>mới nhất từ chúng tôi.
        </p>
        <div class="flex gap-2">
            <input 
                type="email" 
                placeholder="Nhập địa chỉ email..." 
                class="flex-1 border border-gray-300 rounded px-4 py-2 text-sm focus:outline-none focus:border-blue-400"
            >
            <button class="bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded px-5 py-2 text-sm transition-colors">
                Đăng ký ngay
            </button>
        </div>
    </div>

</body>
</html>
