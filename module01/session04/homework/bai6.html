<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh mục Sản phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-6xl p-8 text-center">
      <h2 class="text-lg font-bold text-gray-800 mb-6">Danh mục Sản phẩm Nổi bật</h2>

      <!-- Dùng inline-block để các nút nằm trên cùng 1 dòng và vẫn set được width/height -->
      <div class="space-x-3">
        <a
          href="#"
          class="inline-block w-32 py-2 border-2 border-sky-500 text-sky-600 rounded-full text-sm font-medium hover:bg-sky-500 hover:text-white transition-colors"
          >Laptop</a
        >
        <a
          href="#"
          class="inline-block w-32 py-2 border-2 border-sky-500 text-sky-600 rounded-full text-sm font-medium hover:bg-sky-500 hover:text-white transition-colors"
          >Điện Thoại</a
        >
        <a
          href="#"
          class="inline-block w-44 py-2 border-2 border-sky-500 text-sky-600 rounded-full text-sm font-medium hover:bg-sky-500 hover:text-white transition-colors"
          >Phụ Kiện Điện Tử</a
        >
        <a
          href="#"
          class="inline-block w-48 py-2 border-2 border-sky-500 text-sky-600 rounded-full text-sm font-medium hover:bg-sky-500 hover:text-white transition-colors"
          >Máy Tính Bảng (Tablet)</a
        >
        <a
          href="#"
          class="inline-block w-44 py-2 border-2 border-sky-500 text-sky-600 rounded-full text-sm font-medium hover:bg-sky-500 hover:text-white transition-colors"
          >Đồng Hồ Thông Minh</a
        >
      </div>
    </div>
  </body>
</html>
